{% extends 'base.html' %}

{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block main %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');

  .register-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 50%, #fdf4ff 100%);
    border-radius: 16px;
    font-family: 'Sora', sans-serif;
  }

  .register-card {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 32px rgba(99,102,241,0.10);
  }

  .register-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #dcfce7;
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: #16a34a;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .register-badge .dot {
    width: 6px; height: 6px;
    background: #16a34a;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .register-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }

  .register-subtitle {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 1.8rem;
  }

  .register-card form p {
    margin-bottom: 1rem;
  }

  .register-card form p label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .register-card form p input {
    width: 100%;
    padding: 11px 14px;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    color: #1e293b;
    font-size: 0.92rem;
    font-family: 'Sora', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .register-card form p input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    background: #fff;
  }

  .errorlist {
    list-style: none;
    margin: 4px 0 0; padding: 0;
  }

  .errorlist li {
    font-size: 0.75rem;
    color: #ef4444;
  }

  /* Help text */
  .register-card form p span.helptext,
  .register-card form p .helptext {
    display: block;
    font-size: 0.72rem;
    color: #94a3b8;
    margin-top: 4px;
    line-height: 1.5;
  }

  .btn-register {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px 20px;
    margin-top: 0.4rem;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 0.92rem;
    font-weight: 600;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 16px rgba(99,102,241,0.25);
  }

  .btn-register:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .register-footer {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 0.80rem;
    color: #94a3b8;
  }

  .register-footer a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 600;
  }

  .register-footer a:hover { color: #4f46e5; }
</style>

<div class="register-wrapper">
  <div class="register-card">

    <div class="register-badge">
      <span class="dot"></span>
      Yangi akkount
    </div>

    <h1 class="register-title">Ro'yxatdan o'tish</h1>
    <p class="register-subtitle">Akkaunt yaratish uchun ma'lumotlarni kiriting</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-register">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Ro'yxatdan o'tish
      </button>
    </form>

    <p class="register-footer">
      Akkaunt bormi? <a href="{% url 'login' %}">Kirish</a>
    </p>

  </div>
</div>
{% endblock %}
