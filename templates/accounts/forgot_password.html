{% extends 'base.html' %}

{% block title %}Parolni unutdim{% endblock %}

{% block main %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');

  .forgot-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 50%, #fdf4ff 100%);
    border-radius: 16px;
    font-family: 'Sora', sans-serif;
  }

  .forgot-card {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 32px rgba(99,102,241,0.10);
  }

  .forgot-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.4rem;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #dbeafe, #ede9fe);
    border: 2px solid #bfdbfe;
    font-size: 2rem;
  }

  .forgot-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #eff6ff;
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: #1d4ed8;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .forgot-badge .dot {
    width: 6px; height: 6px;
    background: #1d4ed8;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .forgot-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }

  .forgot-subtitle {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 1.8rem;
    line-height: 1.5;
  }

  .forgot-card form p {
    margin-bottom: 1rem;
  }

  .forgot-card form p label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .forgot-card form p input {
    width: 100%;
    padding: 11px 14px;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    color: #1e293b;
    font-size: 0.92rem;
    font-family: 'Sora', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .forgot-card form p input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    background: #fff;
  }

  .errorlist {
    list-style: none;
    margin: 4px 0 0; padding: 0;
  }

  .errorlist li {
    font-size: 0.75rem;
    color: #ef4444;
  }

  .divider {
    height: 1px;
    background: #f1f5f9;
    margin: 1.4rem 0;
  }

  .btn-send {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px 20px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 0.92rem;
    font-weight: 600;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 16px rgba(99,102,241,0.25);
  }

  .btn-send:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .forgot-footer {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 0.80rem;
    color: #94a3b8;
  }

  .forgot-footer a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 600;
  }

  .forgot-footer a:hover { color: #4f46e5; }
</style>

<div class="forgot-wrapper">
  <div class="forgot-card">

    <div class="forgot-icon">📧</div>

    <div class="forgot-badge">
      <span class="dot"></span>
      Parolni unutdim
    </div>

    <h1 class="forgot-title">Kodni yuborish</h1>
    <p class="forgot-subtitle">Email manzilingizni kiriting, tasdiqlash kodi yuboramiz</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="divider"></div>

      <button type="submit" class="btn-send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Kodni yuborish
      </button>
    </form>

    <p class="forgot-footer">
      Parolni esladingizmi? <a href="{% url 'login' %}">Kirish</a>
    </p>

  </div>
</div>
{% endblock %}
