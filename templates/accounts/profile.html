{% extends 'base.html' %}

{% block title %}Profil{% endblock %}

{% block main %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');

  .profile-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 50%, #fdf4ff 100%);
    border-radius: 16px;
    font-family: 'Sora', sans-serif;
  }

  .profile-card {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 8px 32px rgba(99,102,241,0.10);
  }

  /* Avatar */
  .profile-avatar {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.4rem;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e0e7ff, #fdf4ff);
    border: 2px solid #e2e8f0;
    font-size: 2rem;
  }

  .profile-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff7ed;
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: #ea580c;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .profile-badge .dot {
    width: 6px; height: 6px;
    background: #ea580c;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .profile-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }

  .profile-subtitle {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 1.8rem;
  }

  .profile-card form p {
    margin-bottom: 1rem;
  }

  .profile-card form p label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .profile-card form p input,
  .profile-card form p textarea,
  .profile-card form p select {
    width: 100%;
    padding: 11px 14px;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    color: #1e293b;
    font-size: 0.92rem;
    font-family: 'Sora', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .profile-card form p input:focus,
  .profile-card form p textarea:focus,
  .profile-card form p select:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    background: #fff;
  }

  .profile-card form p span.helptext {
    display: block;
    font-size: 0.72rem;
    color: #94a3b8;
    margin-top: 4px;
    line-height: 1.5;
  }

  .errorlist {
    list-style: none;
    margin: 4px 0 0; padding: 0;
  }

  .errorlist li {
    font-size: 0.75rem;
    color: #ef4444;
  }

  /* Divider */
  .profile-divider {
    height: 1px;
    background: #f1f5f9;
    margin: 1.4rem 0;
  }

  .btn-save {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px 20px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 0.92rem;
    font-weight: 600;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 16px rgba(99,102,241,0.25);
  }

  .btn-save:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
</style>

<div class="profile-wrapper">
  <div class="profile-card">

    <div class="profile-avatar">👤</div>

    <div class="profile-badge">
      <span class="dot"></span>
      Profil
    </div>

    <h1 class="profile-title">Profil ma'lumotlari</h1>
    <p class="profile-subtitle">Ma'lumotlaringizni yangilash uchun o'zgartiring</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="profile-divider"></div>

      <button type="submit" class="btn-save">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Saqlash
      </button>
    </form>

  </div>
</div>
{% endblock %}
